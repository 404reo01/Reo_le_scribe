version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: reo_user
      POSTGRES_PASSWORD: reo_pass
      POSTGRES_DB: reo_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "15432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-reo_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./src/backend
      dockerfile: ../../docker/backend/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    volumes:
      - ./src/backend:/app
      - ./shared:/shared
      - /app/node_modules
    ports:
      - "${PORT:-3000}:3000"
      # RTP port range for mediasoup (100 ports, enough for 10 users)
      - "40000-40099:40000-40099/udp"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./src/frontend
      dockerfile: ../../docker/frontend/Dockerfile
    restart: unless-stopped
    volumes:
      - ./src/frontend:/app
      - ./shared:/shared
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
